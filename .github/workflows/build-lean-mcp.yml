# Build and push the Paper Assistant Docker image to GHCR.
#
# This is the UNIFIED image used by:
#   - Folio deployment (folio.litlfred.org) — MCP server + viewer
#   - publish.yml — PDF build, HTML generation, PR previews
#   - lean-build.yml — content pipeline + Lean proof status
#   - blueprint.yml — LeanBlueprint + doc-gen4
#   - Local hooks — render-on-change.sh, render-pre-commit.sh (Docker fallback)
#
# Triggers on:
#   - Push to main touching content, Lean, MCP server, Dockerfile, or CI scripts
#   - Manual dispatch
#   - Twice weekly (to keep the Mathlib olean cache warm against drift
#     and pick up TeX Live security updates)
#
# The self-updater on the folio server polls for new image digests
# and auto-deploys.

name: Build Paper Assistant Image

on:
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/paper-assistant

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-latest ships with ~14 GB free disk; the paper-assistant
      # image build needs more once we add TeX Live full, Mathlib
      # oleans for three papers, the hecke-engine Rust build, and
      # GHA build-cache layers.  Reclaim ~30 GB by removing
      # pre-installed toolchains we don't use.
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache (ghcr.io/.../paper-assistant:buildcache) is
          # faster on pull than `type=gha` and isn't subject to the
          # GHA cache size / per-key churn limits.  The cache tag is
          # separate from `:latest` and shares the same GHCR namespace.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
