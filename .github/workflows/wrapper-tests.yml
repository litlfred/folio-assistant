name: Wrapper tests (per-language smoke matrix)

# Runs the per-wrapper smoke tests against the hecke-engine-c shared
# library (and the Rust crate directly for jvm + wasm). Each toolchain
# has its own job so a missing dependency on one runtime doesn't block
# the others.
#
# Triggered on PRs that touch any wrapper or the engine itself; also
# manually via workflow_dispatch.

on:
  workflow_dispatch:

concurrency:
  group: wrapper-tests-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. Build the shared C ABI ── publishes libhecke_engine_c.so as
  # an artifact consumed by the C / octave / julia / gap / r jobs.
  build-c-abi:
    name: Build libhecke_engine_c.so
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/hecke-engine-c -> target
      - name: Build hecke-engine-c
        run: cd tools/hecke-engine-c && cargo build --release
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: hecke-engine-c
          path: |
            tools/hecke-engine-c/target/release/libhecke_engine_c.so
            tools/hecke-engine-c/include/hecke_engine.h
          retention-days: 1

  # ── 2. C smoke test ──
  c-smoke:
    name: C smoke
    needs: build-c-abi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev
      - uses: actions/download-artifact@v4
        with:
          name: hecke-engine-c
          path: tools/hecke-engine-c/
      - name: Build smoke binary
        run: |
          cd tools/hecke-engine-c
          gcc -O2 -I include test/smoke.c \
              -L target/release -lhecke_engine_c -lgmp -lmpfr \
              -lpthread -ldl -lm \
              -Wl,-rpath,'$ORIGIN/target/release' \
              -o test/smoke
      - name: Run smoke binary
        run: |
          cd tools/hecke-engine-c
          LD_LIBRARY_PATH=target/release ./test/smoke

  # ── 3. Octave MEX smoke ──
  octave-smoke:
    name: Octave MEX smoke
    needs: build-c-abi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Octave + system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y octave octave-dev libgmp-dev libmpfr-dev
      - uses: actions/download-artifact@v4
        with:
          name: hecke-engine-c
          path: tools/hecke-engine-c/
      - name: Build MEX files
        run: cd tools/hecke-engine-octave && make
      - name: Run smoke
        run: |
          cd tools/hecke-engine-octave
          # `LD_LIBRARY_PATH` is consulted at dlopen-time relative to
          # the *current* CWD if it contains a relative path; once
          # Octave does `cd test` inside the eval, a relative
          # `../hecke-engine-c/target/release` resolves to
          # `tools/hecke-engine-octave/hecke-engine-c/...` (wrong dir).
          # Use the absolute path so the resolution is CWD-invariant.
          # Same for `addpath(pwd)` — register absolute MEX dir before
          # entering test/.
          LD_LIBRARY_PATH="$GITHUB_WORKSPACE/tools/hecke-engine-c/target/release" \
            octave --no-gui --eval "addpath(pwd); cd test; smoke"

  # ── 4. Julia smoke ──
  julia-smoke:
    name: Julia ccall smoke
    needs: build-c-abi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev
      - uses: actions/download-artifact@v4
        with:
          name: hecke-engine-c
          path: tools/hecke-engine-c/
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
      - name: Run Julia smoke
        run: |
          cd tools/hecke-engine-julia
          export HECKE_ENGINE_C_LIB=$(pwd)/../hecke-engine-c/target/release/libhecke_engine_c.so
          julia --project=. -e 'import Pkg; Pkg.instantiate(); include("test/runtests.jl")'

  # ── 5. GAP kernel-extension smoke ──
  #
  # GAP is heavy (full TeX/LaTeX-style install ~600 MB) and the kernel-
  # extension build needs `./configure --with-gaproot` which the package
  # template doesn't ship yet. For now we stub the job with a Docker
  # pull + manifest check; full smoke test will land once Phase C ships
  # the `./configure` + `Makefile.in` per the GAP README.
  gap-smoke:
    name: GAP kernel-extension smoke
    needs: build-c-abi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GAP + system deps
        run: |
          sudo apt-get update
          # `libgap-dev` provides /usr/include/gap/{gap_all.h,…} headers
          # the kernel extension's HeckeEngine.c #includes.  Without it
          # `gap` alone installs the runtime only.
          sudo apt-get install -y gap libgap-dev autoconf libtool libgmp-dev libmpfr-dev gcc make
      - uses: actions/download-artifact@v4
        with:
          name: hecke-engine-c
          path: tools/hecke-engine-c/
      - name: Locate GAP root
        id: gaproot
        run: |
          GAP_BIN=$(command -v gap)
          GAPROOT=$(dirname $(dirname $(readlink -f "$GAP_BIN")))
          # apt-installed GAP places sysinfo.gap under /usr/share/gap; honour that.
          [ -f /usr/share/gap/sysinfo.gap ] && GAPROOT=/usr/share/gap
          echo "gaproot=$GAPROOT" >> "$GITHUB_OUTPUT"
          ls -la "$GAPROOT"
      - name: Generate ./configure (autoreconf)
        run: cd tools/hecke-engine-gap/src && autoreconf -fi
      - name: Configure + build kernel extension
        run: |
          cd tools/hecke-engine-gap/src
          ./configure \
            --with-gaproot=${{ steps.gaproot.outputs.gaproot }} \
            --with-hecke-engine-c=$GITHUB_WORKSPACE/tools/hecke-engine-c
          # The apt-installed GAP's sysinfo.gap leaves GAC_CFLAGS empty
          # (Debian/Ubuntu's packaging variant), so configure.ac propagates
          # an empty GAP_CFLAGS into the Makefile.  Override GAP_CFLAGS on
          # the make command-line to point at libgap-dev's header dir,
          # which is where `gap_all.h` actually lives.
          make GAP_CFLAGS="-I/usr/include/gap"
      - name: Run smoke.tst
        run: |
          cd tools/hecke-engine-gap
          ln -sf "$PWD" "${{ steps.gaproot.outputs.gaproot }}/pkg/HeckeEngine" || \
            sudo ln -sf "$PWD" "${{ steps.gaproot.outputs.gaproot }}/pkg/HeckeEngine"
          gap -A --quitonbreak tst/smoke.tst

  # ── 6. Node smoke ──
  node-smoke:
    name: Node napi-rs smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/hecke-engine-node -> target
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build native module + run tests
        run: |
          cd tools/hecke-engine-node
          npm install --no-audit --no-fund
          npm run build
          npm test

  # ── 7. JVM Rust unit tests + UniFFI Kotlin binding generation ──
  jvm-rust-tests:
    name: JVM Rust unit tests + Kotlin bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/hecke-engine-jvm -> target
      - name: cargo test + build cdylib
        # `cargo test` only builds the test harness; uniffi-bindgen needs
        # the cdylib (target/release/libhecke_engine_jvm.so), so an
        # explicit `cargo build --release` ensures the .so exists.
        run: |
          cd tools/hecke-engine-jvm
          cargo test --release
          cargo build --release
      - name: Generate Kotlin bindings
        # The crate uses UDL-based scaffolding
        # (`uniffi::include_scaffolding!` in src/lib.rs + build.rs runs
        # `uniffi::generate_scaffolding(".../hecke_engine_jvm.udl")`).
        # For UDL crates, uniffi-bindgen's `--library` flag does NOT
        # work — it only extracts metadata from proc-macro-defined
        # crates.  Pass the .udl file path directly instead.  See
        # https://mozilla.github.io/uniffi-rs/0.28/tutorial/foreign_language_bindings.html
        run: |
          cd tools/hecke-engine-jvm
          cargo run --release --bin uniffi-bindgen generate \
            src/hecke_engine_jvm.udl \
            --language kotlin \
            --out-dir bindings/kotlin/
          # Verify Kotlin file produced + has the expected public surface.
          # uniffi 0.28 honours `package_name = "org.litlfred.qou.hecke_engine"`
          # from uniffi.toml, so the generated file lands under that
          # gradle-style path — NOT under `uniffi/hecke_engine_jvm/`.
          # UDL function names are emitted as `fun \`name\`(...)` with
          # backticks (Kotlin reserved-keyword guard); the grep pattern
          # must include them.
          KT=bindings/kotlin/org/litlfred/qou/hecke_engine/hecke_engine_jvm.kt
          test -f "$KT"
          for fn in version markovZ heckeH traceWeights gramMatrixFlat \
                    gramDet chiLambdaBraid lrCoefficient trMAtomicMpfr; do
            grep -q "fun \`$fn\`" "$KT" \
              || { echo "missing fun $fn in generated Kotlin"; exit 1; }
          done
          echo "Kotlin bindings generated with all 9 Phase A+B functions present."
      - name: Upload Kotlin bindings
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-bindings
          path: tools/hecke-engine-jvm/bindings/kotlin/
          retention-days: 7

  # ── 8. WASM (Rust) tests — wasm-pack browser harness deferred ──
  wasm-rust-tests:
    name: WASM Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/hecke-engine-wasm -> target
      - name: cargo test
        run: cd tools/hecke-engine-wasm && cargo test --release --lib

  # ── 8a. WASM bundle build verification ──
  # Builds the ACTUAL .wasm bundle (not just the Rust source's host
  # cargo test) to catch wasm-bindgen registration / serde-json /
  # JsValue lowering errors that pure cargo test misses. A full
  # browser test harness (wasm-pack test --node / --headless) needs
  # the test functions rewritten with wasm_bindgen_test::wasm_bindgen_test
  # — deferred to a follow-up; the build step alone catches link
  # errors which is the most common breakage mode.
  wasm-bundle-build:
    name: WASM bundle build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/hecke-engine-wasm -> target
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.0'
      - name: wasm-pack build
        run: cd tools/hecke-engine-wasm && wasm-pack build --target nodejs --release

  # ── 9. R extendr smoke ──
  r-smoke:
    name: R extendr smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # rextendr 0.4 layout: Rust crate lives at src/rust/Cargo.toml,
          # not the package root.
          workspaces: tools/hecke-engine-r/src/rust -> target
      - name: Install rextendr + devtools (RSPM binary repo)
        # The Posit Package Manager (RSPM) URL in the env block above
        # serves *binary* packages for noble — no source compilation,
        # no transitive-dep cascade.  Both rextendr 0.4+ and recent
        # extendr-based packages REQUIRE `devtools::document()`
        # (rextendr::register_extendr() became a no-op deprecation in
        # 0.4.0).  Round-3's "skip devtools" gambit hit a real
        # rextendr version barrier; RSPM binary install is fast and
        # reliable.
        run: Rscript -e 'install.packages(c("rextendr", "pkgload", "devtools"))'
      - name: Build + load + smoke
        run: |
          cd tools/hecke-engine-r
          # rextendr 0.5 deprecated rextendr::document() AND the explicit
          # extendr_roclet name simultaneously — the only forward-
          # compatible path is the auto-bootstrap entry point:
          #
          #   use_extendr() — idempotent; writes the right Roxygen
          #     line into DESCRIPTION (whatever the installed rextendr
          #     version names its roclet), confirms src/rust/Cargo.toml
          #     + src/rust/src/lib.rs are in place.
          #   devtools::document() — actually runs the roclet (which
          #     use_extendr just registered), generating src/Makevars
          #     + src/entrypoint.c + R/extendr-wrappers.R.
          #   pkgload::load_all() — compile + load the cdylib.
          #
          # `overwrite = TRUE` is needed because the repo's DESCRIPTION
          # is already set up; without it, use_extendr() refuses to
          # update an existing config.
          # use_extendr(overwrite=TRUE) bootstraps the package layout
          # but ALSO overwrites src/rust/Cargo.toml and
          # src/rust/src/lib.rs with rextendr's "hello_world" template
          # — destroying our real #[extendr] functions in the process.
          #
          # Strategy:
          #   - Keep use_extendr's Cargo.toml (it adds `[[bin]] document`
          #     which Makevars depends on for R wrapper generation).
          #     Inject only our `hecke-engine` path dependency.
          #   - Restore our real lib.rs over the hello_world template
          #     so the cargo `document` binary scans the right
          #     #[extendr] functions.
          cp src/rust/src/lib.rs /tmp/real_lib.rs
          Rscript -e 'rextendr::use_extendr(quiet = TRUE, overwrite = TRUE)'
          # Add the hecke-engine local-path dep under [dependencies].
          sed -i '/^\[dependencies\]/a hecke-engine = { path = "../../../hecke-engine" }' \
            src/rust/Cargo.toml
          cp /tmp/real_lib.rs src/rust/src/lib.rs
          # use_extendr() generates configure/cleanup shell scripts but
          # leaves them non-executable (R generates them with 0644);
          # R CMD INSTALL then complains "'cleanup' exists but is not
          # executable".  Mark them +x here.
          chmod +x configure cleanup 2>/dev/null || true
          # roxygen2 refuses to overwrite a NAMESPACE that wasn't
          # generated by itself ("It already exists and was not
          # generated by roxygen2."), so the manually-committed
          # NAMESPACE blocks the rextendr-derived `export(qou_*)`
          # lines from landing — exports drift, every smoke call then
          # errors `could not find function "qou_version"`.
          #
          # But we can't just `rm -f NAMESPACE` — devtools::document()
          # internally runs pkgload::load_all() → pkgbuild::compile_dll
          # → R CMD INSTALL BEFORE the roclet step, and R CMD INSTALL
          # demands NAMESPACE exist.  Patch line 1 to the roxygen2
          # magic comment so install passes and the post-install
          # roclet step takes ownership.
          sed -i '1c\# Generated by roxygen2: do not edit by hand' NAMESPACE
          Rscript -e 'devtools::document(".")'
          Rscript -e 'pkgload::load_all("."); source("tests/smoke.R")'

  # ── 10. SageMath examples smoke ──
  # Runs the vanilla-Python hecke_surface.py demo inside SageMath. The
  # two .sage scripts (sage_iwahori_adjacency, sage_partition_q_dim)
  # require pyhecke installed via sage -pip; we install from local
  # source tree to avoid a PyPI dependency.
  sage-smoke:
    name: SageMath smoke
    runs-on: ubuntu-latest
    # Sage Docker image is ~3 GB; cap the job and skip on draft PRs.
    if: github.event.pull_request.draft != true
    container:
      image: sagemath/sagemath:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Install pyhecke + qou-substrate from local sources
        run: |
          sage -pip install --no-deps \
            ./tools/qou-substrate \
            ./tools/pyhecke \
            ./tools/witness-schema
          sage -pip install pydantic numpy mpmath
      - name: Run hecke_surface.py (vanilla-Python smoke)
        run: |
          sage -python tools/sage-examples/scripts/hecke_surface.py
      - name: Run sage_partition_q_dim.sage (Sage-native cross-check)
        run: |
          sage tools/sage-examples/scripts/sage_partition_q_dim.sage
