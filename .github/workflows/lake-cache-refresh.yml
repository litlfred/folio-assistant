name: Lake cache refresh (orphan-branch family)

# Refreshes the `lake-cache/<package>-<toolchain>` family of orphan
# branches. Tier-2 of the hybrid Lean-cache strategy
# (.github/actions/lake-cache-restore/).
#
# Content-agnostic: the package roster (names + Lake roots) is NOT
# hardcoded here — it is read from .github/lake-packages.json, which a
# downstream repo edits to match its own Lean packages. The branch family
# is bounded: N packages × ≤2 active toolchain versions; the "cleanup" job
# enforces a keep-2-per-package cap.

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Single package to refresh (must match a name in .github/lake-packages.json), or "all"'
        required: false
        default: 'all'
        type: string

permissions:
  contents: write  # required to push orphan branches

jobs:
  # Read the package roster from config and emit it as a dynamic matrix so
  # the workflow hardcodes no package names.
  setup:
    name: Load package roster
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
      packages: ${{ steps.read.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          cfg=".github/lake-packages.json"
          if [ ! -f "$cfg" ]; then
            echo "::error::$cfg not found — define the Lake package roster there."
            exit 1
          fi
          # Optionally narrow to a single requested package.
          sel='${{ github.event.inputs.package }}'
          if [ -n "$sel" ] && [ "$sel" != "all" ]; then
            matrix=$(jq -c --arg p "$sel" '{include: [.packages[] | select(.package == $p)]}' "$cfg")
          else
            matrix=$(jq -c '{include: .packages}' "$cfg")
          fi
          if [ "$(echo "$matrix" | jq '.include | length')" -eq 0 ]; then
            echo "::error::No matching packages in $cfg (requested: '$sel')"
            exit 1
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "packages=$(jq -c '[.packages[].package]' "$cfg")" >> "$GITHUB_OUTPUT"

  refresh:
    name: ${{ matrix.package }} cache
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to push orphan branches

      - name: Install elan + Lean toolchain
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Compute toolchain slug
        id: slug
        run: |
          toolchain=$(grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' lean-toolchain | head -1 || cat lean-toolchain | tr -d ' \n' | head -c 20)
          slug=$(echo "$toolchain" | tr '.' '-' | tr -cd 'a-zA-Z0-9-')
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "toolchain-slug<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$slug" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "orphan-branch<<$EOF" >> "$GITHUB_OUTPUT"
          echo "lake-cache/${{ matrix.package }}-$slug" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Build the package (populates .lake/)
        working-directory: ${{ matrix.lake-root }}
        run: |
          if [ "${{ matrix.package }}" = "mathlib" ]; then
            lake exe cache get
            lake build  # warms .lake/build/lib for the workspace root
          else
            lake build
          fi

      - name: Push .lake/ to orphan branch
        env:
          BRANCH: ${{ steps.slug.outputs.orphan-branch }}
          LAKE_ROOT: ${{ matrix.lake-root }}
        run: |
          set -e
          # Configure git author for the orphan-branch commit.
          git config user.name  "folio-lake-cache-bot"
          git config user.email "folio-lake-cache-bot@users.noreply.github.com"

          # Stage only the .lake/ directory in a temporary worktree-style
          # operation. Use a single orphan-branch commit so the branch
          # has no history (cache regen → cache regen → ...).
          tmpdir=$(mktemp -d)
          cp -r "$LAKE_ROOT/.lake" "$tmpdir/.lake"

          # Create a fresh orphan branch (single commit, no history).
          # `git rm --cached` then `git add` only the .lake/ tree keeps
          # the branch's working tree minimal.
          git symbolic-ref HEAD "refs/heads/$BRANCH"
          git rm --cached -r --quiet . || true
          rm -rf .lake
          cp -r "$tmpdir/.lake" .lake
          rm -rf "$tmpdir"

          # Stage and commit the .lake/ tree only (don't include source).
          git add -f .lake
          msg="lake-cache: ${{ matrix.package }} oleans at ${{ steps.slug.outputs.toolchain-slug }} ($(date -u +%Y-%m-%dT%H:%M:%SZ))

          Auto-generated by .github/workflows/lake-cache-refresh.yml on commit ${{ github.sha }}.
          Restore via .github/actions/lake-cache-restore/ (Tier 2)."
          git commit -m "$msg" --quiet

          # Force-push: the orphan branch always carries exactly one commit.
          git push --force origin "$BRANCH"
          echo "::notice::Pushed cache to orphan branch $BRANCH (size: $(du -sh .lake | cut -f1))"

  cleanup:
    name: Prune orphan-branch family (keep 2 per package)
    needs: [setup, refresh]
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List + prune lake-cache/* branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ needs.setup.outputs.packages }}
        run: |
          # Per package, keep the 2 most-recent cache branches (current
          # + previous toolchain). Delete older ones. The package list
          # comes from .github/lake-packages.json (via the setup job),
          # so nothing is hardcoded here.
          #
          # NOTE: do NOT use `set -e` — the wildcard fetch below exits
          # non-zero when there are no remote refs matching the pattern
          # (first-run case, before any orphan branches have been pushed
          # by the refresh job in this PR's history). The cleanup must
          # degrade gracefully in that scenario rather than failing the
          # whole workflow. Per PR #1097 review (Copilot).

          # Tolerate the fetch's failure on empty pattern.
          git fetch origin --quiet 'refs/heads/lake-cache/*:refs/remotes/origin/lake-cache/*' 2>/dev/null \
            || echo "(no lake-cache/* refs to fetch — first run or no remote branches yet)"

          mapfile -t pkgs < <(echo "$PACKAGES" | jq -r '.[]')
          for pkg in "${pkgs[@]}"; do
            branches=$(git branch -r --list "origin/lake-cache/$pkg-*" \
                       --sort=-committerdate 2>/dev/null | sed 's|.*origin/||' | head -50)
            if [ -z "$branches" ]; then
              echo "No lake-cache/$pkg-* branches yet — skipping prune for $pkg"
              continue
            fi
            echo "Branches for $pkg:"
            echo "$branches" | sed 's/^/  /'
            to_delete=$(echo "$branches" | tail -n +3)
            for b in $to_delete; do
              echo "Pruning old cache: $b"
              git push origin --delete "$b" 2>/dev/null \
                || echo "  (already deleted or push failed)"
            done
          done

          # Hard cap (paranoia for the case where per-package keep-2 still
          # leaves stale entries from a removed package).
          total=$(git branch -r --list 'origin/lake-cache/*' 2>/dev/null | wc -l)
          if [ "$total" -gt 20 ]; then
            echo "::warning::lake-cache/* branch count = $total (> 20 cap). Manual cleanup recommended."
          fi
