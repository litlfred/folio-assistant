# QA sweep CI — runs the automated checkers for ALL six
# integration-watcher axes (voice, proof, canonical, compute,
# detangler, bibliography) against every change.
#
# Triggers
# ────────
#   pull_request — PRs that touch any of:
#     - content/**/*.{md,ts,lean}
#     - content/pipeline/qa-*.ts
#     - content/pipeline/qa-criteria-registry.ts
#     - folio-assistant/schemas/block-qa.ts
#     - .claude/skills/local/*integration-watcher.md
#     - .claude/skills/local/integration-{watch,backlog,audit}.md
#     - this workflow file
#   push (main) — same path filters
#   workflow_dispatch — manual run
#
# Behaviour
# ─────────
#   - Runs `bun run qa-sweep:ci` on the QOU paper. Defaults to
#     every registered criterion across all six axes (31 total).
#     Currently `continue-on-error: true` while the cross-axis
#     baseline is cleaned up. Once each axis's critical count hits
#     zero, flip to strict per-axis by adding a separate gating job.
#   - Runs `bun run qa-staleness:ci` to surface blocks with stale or
#     missing sidecars under the full criterion set.
#
# Schema / skill references
# ─────────────────────────
#   - Skills: `.claude/skills/local/{one-voice,proof,canonical,compute,detangler}-integration-watcher.md`
#   - Dispatchers: `.claude/skills/local/integration-{watch,backlog,audit}.md`
#   - Schema: `folio-assistant/schemas/block-qa.ts`
#   - Registry: `content/pipeline/qa-criteria-registry.ts`

name: QA sweep (all integration watchers)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa-sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.30"

      - name: Install content deps
        run: |
          cd content
          bun install --frozen-lockfile 2>/dev/null || bun install

      # Warn-only while the baseline still has 213 critical findings
      # (mostly §7c wall-side drift). Once the backlog is cleaned up,
      # remove `continue-on-error` so the workflow gates merges.
      - name: QA sweep (warn-only on baseline criticals)
        continue-on-error: true
        run: |
          cd content
          bun run qa-sweep:ci 2>&1 | tee /tmp/qa-sweep.log
          echo ""
          echo "Sweep exit code: ${PIPESTATUS[0]}"

      # Per-axis summary — one block per integration watcher, so a
      # reviewer can scan the workflow run page and see which axis
      # is driving the critical count.
      - name: Per-axis fail summary
        continue-on-error: true
        run: |
          cd content
          for axis in one-voice proof canonical compute detangler bibliography; do
            echo ""
            echo "── axis: $axis ─────────────────────────────────"
            bun run pipeline/qa-sweep.ts quantum-observable-universe \
              --axis "$axis" --json 2>/dev/null \
              | python3 -c "
import json, sys, collections
d = json.load(sys.stdin)
c = collections.Counter()
for b in d.get('blocks', []):
    for det in b.get('details', []):
        if 'fail' in det.get('outcome', ''):
            c[det['criterion']] += 1
print(f'criteria run: {len(d[\"want_criteria\"])}')
for k, v in sorted(c.items(), key=lambda x: -x[1]):
    print(f'  {v:4d} {k}')
" 2>&1 | tee /tmp/qa-axis-$axis.log
          done

      - name: QA staleness map
        continue-on-error: true
        run: |
          cd content
          bun run qa-staleness:ci 2>&1 | tee /tmp/qa-staleness.log

      # Schema sanity — every committed .qa.json must declare the v1
      # schema marker. Strict (fails the workflow on shape drift).
      - name: Schema sanity (.qa.json files)
        run: |
          bad=0
          while IFS= read -r f; do
            if ! grep -q '"\$schema": "block-qa/v1"' "$f"; then
              echo "::error file=$f::missing or wrong \$schema marker"
              bad=$((bad+1))
            fi
          done < <(find content -name '*.qa.json' -type f)
          if [ "$bad" -gt 0 ]; then
            echo "::error::$bad sidecar(s) failed schema sanity"
            exit 1
          fi
          echo "schema sanity: all .qa.json files pass"

      - name: Upload sweep + staleness logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-sweep-logs
          path: |
            /tmp/qa-sweep.log
            /tmp/qa-staleness.log
            /tmp/qa-axis-*.log
          retention-days: 14
