name: Docs site (GitHub Pages)

# Builds and deploys the folio-assistant documentation site to GitHub Pages at
# https://litlfred.github.io/folio-assistant/.
#
# Serving model: the built static site is published to the **gh-pages branch**
# (with .nojekyll so it is served exactly as built). Enable it once under
# Settings → Pages → "Deploy from a branch" → gh-pages → / (root).
#
# Pipeline:
#   1. Regenerate the skill schema reference from JSON Schema (bun).
#   2. Build the Jekyll site under docs/ (just-the-docs via remote_theme).
#   3. Generate the TypeScript API reference with TypeDoc into _site/api/.
#   4. Publish the combined _site to the gh-pages branch (peaceiris).
#
# Generated pages (docs/reference/skills/*) are also committed to the repo so
# they are browsable on GitHub directly; this job keeps the published copy fresh.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'schemas/**'
      - 'scripts/gen-schema-docs.ts'
      - '.github/workflows/docs-site.yml'
  workflow_dispatch:

permissions:
  contents: write  # required to push to the gh-pages branch

concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile || bun install

      - name: Regenerate skill schema reference
        run: bun run scripts/gen-schema-docs.ts

      # Build the Jekyll site from docs/ using the github-pages gem
      # (whitelists jekyll-remote-theme, so just-the-docs works).
      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Generate TypeScript API reference (TypeDoc)
        run: |
          npx --yes typedoc \
            --out ./_site/api \
            --entryPointStrategy expand \
            --readme none \
            --hideGenerator \
            --skipErrorChecking \
            --name "folio-assistant API" \
            schemas/types.ts schemas/constraints.ts schemas/builders.ts \
            schemas/assistant-types.ts schemas/assistant-package.ts \
            schemas/assistant-workflow.ts schemas/formalization-types.ts \
            schemas/lean-packages.ts 2>&1 | tail -20

      # Serve the prebuilt static output as-is (just-the-docs is already rendered;
      # /api is TypeDoc HTML).
      - name: Disable Jekyll on the published branch
        run: touch ./_site/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: 'docs(gh-pages): site from ${{ github.sha }}'
