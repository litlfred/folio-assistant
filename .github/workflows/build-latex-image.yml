# DEPRECATED — All CI workflows now use the unified paper-assistant image.
# See build-lean-mcp.yml for the active build workflow.
#
# This workflow is disabled (no automatic triggers). Use manual dispatch
# only if you need a standalone latex-ci image for some reason.
#
# Original: Build and push the LaTeX CI Docker image to GHCR.

name: "[DEPRECATED] Build LaTeX Image"

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/latex-ci

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/powershell /usr/local/.ghcup
          sudo docker system prune -af
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile.latex
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
