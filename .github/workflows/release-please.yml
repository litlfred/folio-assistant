name: release-please

# Tier-2 item 2f from workplan v2. Automates semver + CHANGELOG +
# release-PR creation for the 7 published packages under tools/.
#
# How it works:
#   1. On every push to main, `googleapis/release-please-action`
#      walks the commit history since the last release tag for each
#      configured package.
#   2. It groups commits by conventional-commit type
#      (feat/fix/docs/...) and computes the next semver bump:
#        - feat:        minor bump (or patch with bump-patch-for-minor-pre-major)
#        - fix:         patch bump
#        - feat!:       major bump
#        - chore/test/build: hidden by default; no release
#   3. If there are releasable commits since the last tag, it
#      opens (or updates) a "release-pr" with:
#        - CHANGELOG.md updated
#        - version bumped in pyproject.toml / Cargo.toml / package.json
#          (per the package's `extra-files` config)
#   4. Merging the release-PR triggers the second pass which CREATES
#      the GitHub release + tag (e.g. `pyhecke-v0.2.0`).
#   5. Downstream publish workflows (pyhecke-pypi-publish.yml,
#      pyhecke-native-wheels.yml, etc.) are still triggered manually
#      via workflow_dispatch — release-please does NOT auto-publish.
#      Owner reviews the cut release on GitHub, then triggers the
#      publish workflow with `target=pypi`.
#
# Config:
#   .github/release-please-config.json   — per-package rules
#   .github/release-please-manifest.json — current released versions
#
# KNOWN ISSUE — silent PR-creation failure
# ─────────────────────────────────────────
# Observed 2026-05-24/25: every push to main creates the
# `release-please--branches--main--components--<pkg>` branch on origin
# with a valid release commit, but the PR-open step silently no-ops.
# Two release branches got stranded this way; manually opened as PR
# #1234 (pyhecke 0.1.1) + PR #1235 (qou-substrate 0.1.1).
#
# Most likely cause: GitHub repo setting
#   Settings → Actions → General → "Workflow permissions"
#   → "Allow GitHub Actions to create and approve pull requests"
# is OFF. Without it, `secrets.GITHUB_TOKEN` cannot open PRs even
# with the explicit `pull-requests: write` permission below.
#
# Owner-side fix options (in order of preference):
#   A. Flip the above setting ON (one click; persistent).
#   B. Create a fine-grained PAT with `contents: write` +
#      `pull-requests: write` scopes, store as RELEASE_PLEASE_TOKEN
#      secret, then change the `token:` line below to use it. Bonus:
#      PR-creation uses the PAT-owner's identity so the PR triggers
#      downstream CI (GITHUB_TOKEN-created PRs do not, by design).
#
# Until either lands, every release lifecycle requires the manual
# rescue path: `gh pr create --head release-please--...`. See
# docs/release-process.md (once added) for the exact recipe.

on:
  workflow_dispatch:

permissions:
  contents: write       # create release PRs + tags + releases
  pull-requests: write  # open / update the release PR (also needs the
                        # repo-level "Allow Actions to create PRs"
                        # setting; see KNOWN ISSUE block above)

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Token: GITHUB_TOKEN is the conservative default but suffers
          # from the silent-fail issue documented above. If a fine-
          # grained PAT is available, prefer it via:
          #   token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          # (Coalesce so the workflow still runs when the PAT secret is
          # unset; it just falls back to the half-broken path.)
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
