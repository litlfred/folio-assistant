name = "HeckeEngine"
uuid = "7c0bf6e8-1234-5678-9abc-def012345678"
authors = ["Quantum Observable Universe contributors"]
version = "0.1.0"

[deps]
# Julia-side dependency on the cdylib emitted by hecke-engine-c.
# Libdl is in the standard library; we use `ccall` directly rather
# than the heavyweight `jlrs` crate (which would require building
# Julia-aware Rust code). The C ABI in hecke-engine-c is the
# simpler + more portable path.
Libdl = "8f399da3-3557-5675-b5ff-fb832c97cbdb"

[compat]
julia = "1.9"

[extras]
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["Test"]
