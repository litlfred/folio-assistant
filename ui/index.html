<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Folio Assistant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-font="paper">

  <!-- ── Top navigation bar ────────────────────────────── -->
  <nav class="nav">
    <a href="#/" class="nav-brand">Folio</a>
    <div class="nav-links" id="nav-links"></div>
    <div class="nav-right">
      <button id="c-sb" title="Toggle sidebar">☰</button>
      <button id="c-wd" title="Toggle wide mode">⇔</button>
      <select id="c-br" title="Switch branch"></select>
      <button id="c-diff" title="Show diff from main" style="display:none">diff</button>
      <button id="c-th" title="Toggle theme">light</button>
      <button id="c-fn" title="Toggle font">web</button>
    </div>
  </nav>

  <!-- ── Main content area ─────────────────────────────── -->
  <main id="app">
    <div class="loading">loading...</div>
  </main>

  <!-- ── Feedback panel (slide-in from right) ──────────── -->
  <div class="feedback-overlay" id="feedback-overlay"></div>
  <div class="feedback-panel" id="feedback-panel">
    <div class="fb-head">
      <h3>Feedback</h3>
      <button class="fb-close" id="fb-close">&times;</button>
    </div>
    <div class="fb-target" id="fb-target"></div>
    <div class="fb-input-area">
      <textarea id="fb-text" placeholder="Describe the issue, question, or suggestion..." rows="4"></textarea>
      <div class="fb-controls">
        <select id="fb-priority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="critical">Critical</option>
          <option value="low">Low</option>
        </select>
        <select id="fb-assignee">
          <option value="editor-agent">Editor Agent</option>
          <option value="proof-agent">Proof Agent</option>
          <option value="author">Author</option>
        </select>
        <button class="fb-voice" id="fb-voice" title="Voice input">&#x1F399;</button>
        <button class="fb-submit" id="fb-submit">Submit</button>
      </div>
    </div>
    <div class="fb-history" id="fb-history"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="app.js"></script>
  <script src="chat.js"></script>
</body>
</html>
