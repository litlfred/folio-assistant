<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="760" height="460" rx="10" fill="#11111b"/>
  <!-- toolbar -->
  <rect width="760" height="38" rx="10" fill="#1e1e2e"/>
  <text x="18" y="24" fill="#cdd6f4" font-size="13" font-weight="600">harmonic-series.pdf</text>
  <rect x="540" y="9" width="60" height="20" rx="4" fill="#313244"/>
  <text x="570" y="23" fill="#bac2de" font-size="11" text-anchor="middle">PDF</text>
  <rect x="606" y="9" width="60" height="20" rx="4" fill="#313244"/>
  <text x="636" y="23" fill="#bac2de" font-size="11" text-anchor="middle">HTML</text>
  <rect x="672" y="9" width="74" height="20" rx="4" fill="#89b4fa"/>
  <text x="709" y="23" fill="#11111b" font-size="11" text-anchor="middle">Blueprint</text>

  <!-- page -->
  <rect x="160" y="54" width="440" height="392" rx="4" fill="#f5f5f5"/>
  <text x="380" y="92" fill="#1a1a1a" font-size="17" font-weight="700" text-anchor="middle">A note on the harmonic series</text>
  <line x1="200" y1="106" x2="560" y2="106" stroke="#ddd"/>

  <text x="200" y="134" fill="#333" font-size="11">The harmonic series is the prototypical example of a</text>
  <text x="200" y="150" fill="#333" font-size="11">divergent series whose terms tend to zero.</text>

  <!-- definition box -->
  <rect x="200" y="166" width="360" height="56" rx="3" fill="#eef3ff" stroke="#c7d6ff"/>
  <text x="212" y="184" fill="#2a4d9b" font-size="10.5" font-weight="700">Definition 1 (Harmonic partial sum).</text>
  <text x="212" y="208" fill="#222" font-size="11" font-family="monospace">Hₙ = Σ_{k=1}^{n} 1/k.</text>

  <!-- theorem box -->
  <rect x="200" y="234" width="360" height="58" rx="3" fill="#fff4ee" stroke="#ffd9c2"/>
  <text x="212" y="252" fill="#9b4a2a" font-size="10.5" font-weight="700">Theorem 2 (Divergence).</text>
  <text x="212" y="276" fill="#222" font-size="11">The sequence (Hₙ) is unbounded.</text>

  <!-- lean badge -->
  <rect x="200" y="304" width="200" height="22" rx="11" fill="#e6f5e6"/>
  <circle cx="214" cy="315" r="5" fill="#2ea043"/>
  <text x="226" y="319" fill="#1a5c2a" font-size="10" font-family="monospace">Lean: 0 sorries · verified</text>

  <text x="200" y="352" fill="#333" font-size="11">Example. H₄ = 1 + 1/2 + 1/3 + 1/4 = 25/12.</text>
  <text x="380" y="430" fill="#999" font-size="10" text-anchor="middle">— 1 —</text>
</svg>
